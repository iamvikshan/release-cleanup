name: Build and publish Bun release executables

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            outfile: release-cleanup-linux
            platform: linux
          - os: macos-latest
            target: bun-darwin-x64
            outfile: release-cleanup-macos
            platform: macos
          - os: windows-latest
            target: bun-windows-x64
            outfile: release-cleanup.exe
            platform: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build standalone executable
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} src/index.ts --outfile=dist/${{ matrix.outfile }}

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-cleanup-${{ matrix.platform }}
          path: dist/${{ matrix.outfile }}

    # publishing is handled in a separate job so release creation and notes generation
    # happen once and not per-matrix runner.

  publish:
    name: Publish release and upload artifacts
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist

      - name: Create GitHub release and upload artifacts (generate release notes)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/*
          generate_release_notes: true
          # To supply custom release notes generated with conventional-changelog,
          # generate a file (e.g. release-notes.md) and pass `body_path: release-notes.md` instead.
          # To control authorship, provide a personal access token here; the release author will
          # be the token owner. Example: token: ${{ secrets.RELEASE_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
