name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node, Bun, and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Build standalone executables & JS bundle
        run: |
          mkdir -p dist
          # Build universal JS bundle
          bun build --target=node src/index.ts --outfile=dist/index.js

          # Build OS-specific binaries
          bun build --compile --target=bun-linux-x64 src/index.ts --outfile=dist/release-cleanup-linux-x64
          bun build --compile --target=bun-linux-arm64 src/index.ts --outfile=dist/release-cleanup-linux-arm64
          bun build --compile --target=bun-darwin-x64 src/index.ts --outfile=dist/release-cleanup-macos-x64
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile=dist/release-cleanup-macos-arm64
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile=dist/release-cleanup-windows-x64.exe

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Upload release artifacts
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ steps.semantic.outputs.new_release_git_tag }}"
          echo "Uploading binaries to release $TAG..."

          gh release upload "$TAG" \
            "dist/index.js#Universal JS Bundle (Node/Bun)" \
            "dist/release-cleanup-linux-x64#Linux (x64)" \
            "dist/release-cleanup-linux-arm64#Linux (ARM64)" \
            "dist/release-cleanup-macos-x64#macOS (x64)" \
            "dist/release-cleanup-macos-arm64#macOS (Apple Silicon)" \
            "dist/release-cleanup-windows-x64.exe#Windows (x64)" \
            --clobber
